<html lang="ko">

new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=

<head>
  <meta charset="UTF-8">
  <title>GTM 실습 — 페이지 1</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #f5f5f5; font-family: 'DM Sans', sans-serif; padding: 40px; color: #111; padding-top: 64px; padding-bottom: 220px; }

    h1 { font-family: 'DM Mono', monospace; font-size: 14px; letter-spacing: 2px; color: #888; margin-bottom: 40px; }

    .section { margin-bottom: 48px; }
    .section-title {
      font-size: 11px; letter-spacing: 3px; color: #aaa;
      text-transform: uppercase; margin-bottom: 16px;
      padding-bottom: 8px; border-bottom: 1px solid #e0e0e0;
    }

    .btn {
      display: inline-block; padding: 12px 28px;
      background: #111; color: #fff; border: none;
      font-size: 13px; font-family: 'DM Sans', sans-serif;
      cursor: pointer; margin: 6px; letter-spacing: 1px;
    }
    .btn:hover { background: #333; }
    .btn.outline { background: transparent; color: #111; border: 1px solid #111; }
    .btn.outline:hover { background: #111; color: #fff; }

    .event-label {
      display: inline-block; font-family: 'DM Mono', monospace;
      font-size: 10px; background: #e8f4e8; color: #2d7a2d;
      padding: 2px 8px; margin-left: 8px; vertical-align: middle;
    }

    .nav-link {
      display: inline-block; margin: 6px; padding: 10px 24px;
      background: #fff; border: 1px solid #ddd;
      font-size: 13px; cursor: pointer; text-decoration: none; color: #111;
    }
    .nav-link:hover { border-color: #111; }

    input[type="email"] {
      padding: 10px 16px; border: 1px solid #ccc;
      font-size: 13px; font-family: 'DM Sans', sans-serif;
      width: 220px; outline: none;
    }

    .toast {
      position: fixed; top: 70px; left: 50%;
      transform: translateX(-50%) translateY(-10px);
      background: #111; color: #fff;
      padding: 8px 20px; font-size: 12px;
      opacity: 0; transition: all 0.2s;
      pointer-events: none; z-index: 9999;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── 상단 로그인 바 ── */
    #login-bar {
      position: fixed; top: 0; left: 0; right: 0; height: 52px;
      background: #0d0d0d; color: #fff;
      display: flex; align-items: center; gap: 14px;
      padding: 0 28px; z-index: 1000;
      font-family: 'DM Mono', monospace; font-size: 12px;
      border-bottom: 1px solid #222;
    }
    #login-bar .bar-label { color: #555; letter-spacing: 2px; font-size: 10px; }
    #login-bar select {
      padding: 5px 10px; background: #1a1a1a; color: #ccc;
      border: 1px solid #333; font-size: 11px;
      font-family: 'DM Mono', monospace; cursor: pointer; border-radius: 2px;
    }
    #login-bar .login-btn {
      padding: 5px 16px; background: #7fca7f; color: #0d0d0d;
      border: none; font-size: 11px; cursor: pointer;
      font-family: 'DM Mono', monospace; letter-spacing: 1px; font-weight: 500;
    }
    #login-bar .login-btn:hover { background: #6ab86a; }
    #login-bar .logout-btn {
      padding: 5px 14px; background: transparent; color: #555;
      border: 1px solid #333; font-size: 11px; cursor: pointer;
      font-family: 'DM Mono', monospace;
    }
    #login-bar .logout-btn:hover { border-color: #666; color: #888; }
    #user-status { margin-left: auto; display: flex; align-items: center; gap: 12px; }
    #user-badge {
      display: none; background: #0d2e0d; border: 1px solid #2d7a2d;
      padding: 3px 12px; color: #7fca7f; font-size: 10px; letter-spacing: 1px;
    }
    #user-info { color: #888; font-size: 11px; }

    /* ── DataLayer 뷰어 ── */
    #dl-panel {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: #0a0a0a; font-family: 'DM Mono', monospace; font-size: 11px;
      max-height: 200px; overflow-y: auto;
      border-top: 2px solid #1a1a1a; z-index: 999;
    }
    #dl-panel .dl-header {
      position: sticky; top: 0; background: #0a0a0a;
      padding: 6px 16px; border-bottom: 1px solid #1a1a1a;
      color: #333; letter-spacing: 2px; font-size: 10px;
      display: flex; justify-content: space-between; align-items: center;
    }
    #dl-panel .dl-header .dl-dot { color: #7fca7f; margin-right: 6px; animation: blink 1.2s infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
    #dl-panel .dl-clear { color: #333; cursor: pointer; font-size: 10px; }
    #dl-panel .dl-clear:hover { color: #666; }
    #dl-entries { padding: 4px 0; }
    .dl-entry {
      padding: 5px 16px; border-bottom: 1px solid #111;
      display: grid; grid-template-columns: 65px 180px 120px 1fr;
      gap: 8px; align-items: center;
    }
    .dl-entry .dl-time { color: #333; }
    .dl-entry .dl-event { color: #e0e0e0; }
    .dl-entry .dl-uid { color: #f0a500; }
    .dl-entry .dl-params { color: #5a9a5a; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .dl-entry.ev-login { background: #0d1a0d; border-left: 2px solid #2d7a2d; }
    .dl-entry.ev-logout { background: #1a0d0d; border-left: 2px solid #7a2d2d; }
    .dl-entry.ev-page { background: #0d0d1a; border-left: 2px solid #2d2d7a; }
  </style>
</head>
<body>

<!-- Google Tag Manager (noscript) -->
<noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-N9BXKJ85"
height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>

<h1>GTM 실습 — PAGE 1 / 2 &nbsp;&nbsp; <a href="page2.html" style="color:#888;font-size:11px;">페이지 2로 →</a></h1>


<!-- ── 상단 로그인 바 ── -->
<div id="login-bar">
  <span class="bar-label">USER ID</span>
  <select id="user-select">
    <option value="">-- 가상 회원 선택 --</option>
    <option value="usr_1001|김민준|minjun@gmail.com">👤 김민준 · usr_1001</option>
    <option value="usr_1002|이서연|seoyeon@naver.com">👤 이서연 · usr_1002</option>
    <option value="usr_1003|박지호|jiho@kakao.com">👤 박지호 · usr_1003</option>
    <option value="usr_1004|최수아|sua@gmail.com">👤 최수아 · usr_1004</option>
    <option value="usr_1005|정우진|woojin@naver.com">👤 정우진 · usr_1005</option>
  </select>
  <button class="login-btn" onclick="doLogin()">LOGIN</button>
  <div id="user-status">
    <div id="user-badge">● LOGGED IN</div>
    <span id="user-info"></span>
    <button class="logout-btn" id="logout-btn" style="display:none" onclick="doLogout()">LOGOUT</button>
  </div>
</div>

<h1>GTM 실습 — PAGE 1 / 2 &nbsp;&nbsp; <a href="page2.html" style="color:#888;font-size:11px;">페이지 2로 →</a></h1>

<!-- 1. 네비게이션 클릭 -->
<div class="section">
  <p class="section-title">1. 네비게이션 클릭 <span class="event-label">nav_click</span></p>
  <a class="nav-link" href="#" onclick="push('nav_click',{menu:'홈'});return false;">홈</a>
  <a class="nav-link" href="#" onclick="push('nav_click',{menu:'상품'});return false;">상품</a>
  <a class="nav-link" href="#" onclick="push('nav_click',{menu:'브랜드'});return false;">브랜드</a>
  <a class="nav-link" href="page2.html" onclick="push('nav_click',{menu:'페이지2'});">페이지 2</a>
</div>

<!-- 2. 버튼 클릭 -->
<div class="section">
  <p class="section-title">2. 버튼 클릭 <span class="event-label">button_click</span></p>
  <button class="btn" onclick="push('button_click',{button:'배너 클릭', location:'hero'})">배너 클릭</button>
  <button class="btn outline" onclick="push('button_click',{button:'더보기', location:'section'})">더보기</button>
  <button class="btn outline" onclick="push('button_click',{button:'공유하기', location:'content'})">공유하기</button>
</div>

<!-- 3. 상품 클릭 -->
<div class="section">
  <p class="section-title">3. 상품 클릭 <span class="event-label">view_item</span></p>
  <button class="btn" onclick="push('view_item',{item_id:'P001', item_name:'울 코트', price:298000})">울 코트</button>
  <button class="btn" onclick="push('view_item',{item_id:'P002', item_name:'실크 드레스', price:186000})">실크 드레스</button>
  <button class="btn" onclick="push('view_item',{item_id:'P003', item_name:'버킷햇', price:89000})">버킷햇</button>
</div>

<!-- 4. 뉴스레터 -->
<div class="section">
  <p class="section-title">4. 뉴스레터 구독 <span class="event-label">newsletter_signup</span></p>
  <form onsubmit="newsletter(event)" style="display:flex;gap:0;align-items:center;">
    <input type="email" id="email" placeholder="이메일 입력" required>
    <button class="btn" type="submit" style="margin:0;">구독하기</button>
  </form>
</div>

<div class="toast" id="toast"></div>

<!-- ── DataLayer 실시간 뷰어 ── -->
<div id="dl-panel">
  <div class="dl-header">
    <div><span class="dl-dot">●</span> DATALAYER MONITOR — 실시간 이벤트 스트림</div>
    <span class="dl-clear" onclick="document.getElementById('dl-entries').innerHTML=''">CLEAR</span>
  </div>
  <div id="dl-entries"></div>
</div>

<script>
  window.dataLayer = window.dataLayer || [];

  // 세션 간 user 유지 (page2 이동해도 로그인 상태 유지)
  let currentUser = JSON.parse(sessionStorage.getItem('gtm_demo_user') || 'null');

  function doLogin() {
    const sel = document.getElementById('user-select');
    if (!sel.value) { toast('⚠ 회원을 선택하세요'); return; }
    const [uid, name, email] = sel.value.split('|');
    currentUser = { uid, name, email };
    sessionStorage.setItem('gtm_demo_user', JSON.stringify(currentUser));
    applyUserUI();
    push('login', { method: 'select' }, true);
  }

  function doLogout() {
    push('logout', {}, true);
    currentUser = null;
    sessionStorage.removeItem('gtm_demo_user');
    applyUserUI();
    document.getElementById('user-select').value = '';
  }

  function applyUserUI() {
    const badge     = document.getElementById('user-badge');
    const info      = document.getElementById('user-info');
    const logoutBtn = document.getElementById('logout-btn');
    if (currentUser) {
      badge.style.display = 'block';
      info.textContent    = currentUser.name + ' · ' + currentUser.uid;
      logoutBtn.style.display = 'block';
    } else {
      badge.style.display = 'none';
      info.textContent    = 'Guest (비로그인)';
      logoutBtn.style.display = 'none';
    }
  }

  function push(eventName, params = {}, isAuth = false) {
    const uid     = currentUser ? currentUser.uid : null;
    const payload = { event: eventName, ...params };
    if (uid) payload.user_id = uid;

    // GTM 연동 시 user_id 인식하도록 config push도 같이
    if (isAuth && uid) {
      window.dataLayer.push({ user_id: uid });
    }
    window.dataLayer.push(payload);
    renderDL(eventName, uid, params);
    toast(eventName + ' ✅');
  }

  function renderDL(eventName, uid, params) {
    const el   = document.getElementById('dl-entries');
    const time = new Date().toTimeString().slice(0, 8);

    const paramStr = Object.entries(params || {})
      .map(([k, v]) => `${k}=${JSON.stringify(v)}`)
      .join('  ');

    const typeClass =
      eventName === 'login'     ? 'ev-login'  :
      eventName === 'logout'    ? 'ev-logout' :
      eventName === 'page_view' ? 'ev-page'   : '';

    const row = document.createElement('div');
    row.className = 'dl-entry ' + typeClass;
    row.innerHTML = `
      <span class="dl-time">${time}</span>
      <span class="dl-event">${eventName}</span>
      <span class="dl-uid">${uid ? '👤 ' + uid : '— guest'}</span>
      <span class="dl-params">${paramStr || '—'}</span>
    `;
    el.prepend(row);
  }

  function newsletter(e) {
    e.preventDefault();
    const email = document.getElementById('email').value;
    push('newsletter_signup', { email_domain: email.split('@')[1] || 'unknown' });
    document.getElementById('email').value = '';
  }

  function toast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
  }

  // 초기화
  applyUserUI();
  if (currentUser) {
    // 페이지 이동 후 돌아왔을 때 select 복원
    const sel = document.getElementById('user-select');
    for (let opt of sel.options) {
      if (opt.value.startsWith(currentUser.uid + '|')) { sel.value = opt.value; break; }
    }
  }
  push('page_view', { page: 'page1', page_location: window.location.href });
</script>
</body>
</html>
